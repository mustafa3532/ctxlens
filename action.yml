name: 'ctxlens Context Check'
description: 'Verify your codebase fits within AI model context windows'
branding:
  icon: 'aperture'
  color: 'purple'

inputs:
  model:
    description: 'Target model for budget calculation'
    required: false
    default: 'claude-sonnet-4-6'
  threshold:
    description: 'Fail if utilization exceeds this percentage'
    required: false
    default: '100'
  path:
    description: 'Directory to scan'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
    - name: Install ctxlens
      shell: bash
      run: npm install -g ctxlens@latest
    - name: Run token budget check
      shell: bash
      run: ctxlens scan "${{ inputs.path }}" --model "${{ inputs.model }}" --ci "${{ inputs.threshold }}"
